- name: Installer le module PHP LDAP
  ansible.builtin.apt:
    name:
      - php-ldap
    state: present
    update_cache: true
  notify: Restart Apache

- name: Vérifier si Nextcloud est installé
  ansible.builtin.command: sudo -u www-data php {{ nextcloud_web_root }}/occ status
  register: nextcloud_status_ldap
  changed_when: false
  failed_when: false

- name: Lister les apps Nextcloud
  ansible.builtin.command: sudo -u www-data php {{ nextcloud_web_root }}/occ app:list
  register: nextcloud_apps_list_ldap
  changed_when: false
  when: "'installed: true' in nextcloud_status_ldap.stdout"

- name: Installer l'app LDAP si absente
  ansible.builtin.command: sudo -u www-data php {{ nextcloud_web_root }}/occ app:install user_ldap
  register: ldap_app_install
  failed_when: false
  changed_when: "'installed' in (ldap_app_install.stdout | lower)"
  when:
    - "'installed: true' in nextcloud_status_ldap.stdout"
    - "'user_ldap:' not in nextcloud_apps_list_ldap.stdout"

- name: Activer l'app LDAP si nécessaire
  ansible.builtin.command: sudo -u www-data php {{ nextcloud_web_root }}/occ app:enable user_ldap
  register: ldap_app_enable
  failed_when: false
  changed_when: "'enabled' in (ldap_app_enable.stdout | lower)"
  when:
    - "'installed: true' in nextcloud_status_ldap.stdout"
    - "'user_ldap:' in nextcloud_apps_list_ldap.stdout"

- name: Afficher les configs LDAP existantes
  ansible.builtin.command: sudo -u www-data php {{ nextcloud_web_root }}/occ ldap:show-config
  register: ldap_show_config
  changed_when: false
  failed_when: false
  when: "'installed: true' in nextcloud_status_ldap.stdout"

- name: Créer une config LDAP vide si absente
  ansible.builtin.command: sudo -u www-data php {{ nextcloud_web_root }}/occ ldap:create-empty-config
  register: ldap_create_config
  changed_when: "'Created new configuration' in ldap_create_config.stdout"
  when:
    - "'installed: true' in nextcloud_status_ldap.stdout"
    - nextcloud_ldap_config_id not in ldap_show_config.stdout

- name: Définir l'hôte LDAP
  ansible.builtin.command: >
    sudo -u www-data php {{ nextcloud_web_root }}/occ ldap:set-config
    {{ nextcloud_ldap_config_id }} ldapHost "{{ ldap_host }}"
  changed_when: false

- name: Définir le port LDAP
  ansible.builtin.command: >
    sudo -u www-data php {{ nextcloud_web_root }}/occ ldap:set-config
    {{ nextcloud_ldap_config_id }} ldapPort "{{ ldap_port }}"
  changed_when: false

- name: Définir le DN de base LDAP
  ansible.builtin.command: >
    sudo -u www-data php {{ nextcloud_web_root }}/occ ldap:set-config
    {{ nextcloud_ldap_config_id }} ldapBase "{{ ldap_base_dn }}"
  changed_when: false

- name: Définir la base utilisateurs
  ansible.builtin.command: >
    sudo -u www-data php {{ nextcloud_web_root }}/occ ldap:set-config
    {{ nextcloud_ldap_config_id }} ldapBaseUsers "{{ ldap_user_base_dn }}"
  changed_when: false

- name: Définir la base groupes
  ansible.builtin.command: >
    sudo -u www-data php {{ nextcloud_web_root }}/occ ldap:set-config
    {{ nextcloud_ldap_config_id }} ldapBaseGroups "{{ ldap_group_base_dn }}"
  changed_when: false

- name: Définir le bind DN
  ansible.builtin.command: >
    sudo -u www-data php {{ nextcloud_web_root }}/occ ldap:set-config
    {{ nextcloud_ldap_config_id }} ldapAgentName "{{ ldap_bind_dn }}"
  changed_when: false

- name: Vérifier que le mot de passe LDAP est défini
  ansible.builtin.assert:
    that:
      - vault_ldap_bind_password is defined
      - vault_ldap_bind_password | length > 0
    fail_msg: "La variable vault_ldap_bind_password est absente ou vide."
  no_log: true

- name: Définir le mot de passe du bind DN
  ansible.builtin.command:
    argv:
      - sudo
      - -u
      - www-data
      - php
      - "{{ nextcloud_web_root }}/occ"
      - ldap:set-config
      - "{{ nextcloud_ldap_config_id }}"
      - ldapAgentPassword
      - "{{ vault_ldap_bind_password }}"
  register: ldap_bind_password_result
  failed_when: ldap_bind_password_result.rc != 0
  changed_when: false
  no_log: true

- name: Définir le filtre de login
  ansible.builtin.command: >
    sudo -u www-data php {{ nextcloud_web_root }}/occ ldap:set-config
    {{ nextcloud_ldap_config_id }} ldapLoginFilter "{{ ldap_login_filter }}"
  changed_when: false

- name: Définir le filtre utilisateurs
  ansible.builtin.command: >
    sudo -u www-data php {{ nextcloud_web_root }}/occ ldap:set-config
    {{ nextcloud_ldap_config_id }} ldapUserFilter "{{ ldap_user_filter }}"
  changed_when: false

- name: Définir le filtre groupes
  ansible.builtin.command: >
    sudo -u www-data php {{ nextcloud_web_root }}/occ ldap:set-config
    {{ nextcloud_ldap_config_id }} ldapGroupFilter "{{ ldap_group_filter }}"
  changed_when: false

- name: Définir l'attribut username
  ansible.builtin.command: >
    sudo -u www-data php {{ nextcloud_web_root }}/occ ldap:set-config
    {{ nextcloud_ldap_config_id }} ldapExpertUsernameAttr "{{ ldap_username_attr }}"
  changed_when: false

- name: Définir l'attribut d'affichage
  ansible.builtin.command: >
    sudo -u www-data php {{ nextcloud_web_root }}/occ ldap:set-config
    {{ nextcloud_ldap_config_id }} ldapDisplayName "{{ ldap_display_name_attr }}"
  changed_when: false

- name: Définir l'attribut mail
  ansible.builtin.command: >
    sudo -u www-data php {{ nextcloud_web_root }}/occ ldap:set-config
    {{ nextcloud_ldap_config_id }} ldapEmailAttribute "{{ ldap_email_attr }}"
  changed_when: false

- name: Définir l'attribut UUID utilisateur
  ansible.builtin.command: >
    sudo -u www-data php {{ nextcloud_web_root }}/occ ldap:set-config
    {{ nextcloud_ldap_config_id }} ldapUuidUserAttribute "{{ ldap_uuid_user_attr }}"
  changed_when: false

- name: Définir l'attribut UUID groupe
  ansible.builtin.command: >
    sudo -u www-data php {{ nextcloud_web_root }}/occ ldap:set-config
    {{ nextcloud_ldap_config_id }} ldapUuidGroupAttribute "{{ ldap_uuid_group_attr }}"
  changed_when: false

- name: Définir l'attribut nom de groupe
  ansible.builtin.command: >
    sudo -u www-data php {{ nextcloud_web_root }}/occ ldap:set-config
    {{ nextcloud_ldap_config_id }} ldapGroupDisplayName "{{ ldap_groupname_attr }}"
  changed_when: false

- name: Définir l'encodage UUID utilisateur
  ansible.builtin.command: >
    sudo -u www-data php {{ nextcloud_web_root }}/occ ldap:set-config
    {{ nextcloud_ldap_config_id }} ldapExpertUUIDUserAttrBinary "1"
  changed_when: false

- name: Définir l'encodage UUID groupe
  ansible.builtin.command: >
    sudo -u www-data php {{ nextcloud_web_root }}/occ ldap:set-config
    {{ nextcloud_ldap_config_id }} ldapExpertUUIDGroupAttrBinary "1"
  changed_when: false

- name: Désactiver StartTLS
  ansible.builtin.command: >
    sudo -u www-data php {{ nextcloud_web_root }}/occ ldap:set-config
    {{ nextcloud_ldap_config_id }} ldapTLS "{{ ldap_use_tls }}"
  changed_when: false

- name: Conserver la vérification certificat
  ansible.builtin.command: >
    sudo -u www-data php {{ nextcloud_web_root }}/occ ldap:set-config
    {{ nextcloud_ldap_config_id }} turnOffCertCheck "{{ ldap_turn_off_cert_check }}"
  changed_when: false

- name: Vérifier la résolution DNS du DC
  ansible.builtin.command:
    argv:
      - getent
      - hosts
      - "{{ ldap_host }}"
  register: ldap_dns_check
  changed_when: false
  failed_when: false

- name: Vérifier l'ouverture du port LDAP
  ansible.builtin.wait_for:
    host: "{{ ldap_host }}"
    port: "{{ ldap_port }}"
    timeout: 5
    state: started
  register: ldap_port_check

- name: Afficher le résultat du précheck LDAP
  ansible.builtin.debug:
    msg:
      - "Host LDAP: {{ ldap_host }}"
      - "Port LDAP: {{ ldap_port }}"
      - "DNS rc: {{ ldap_dns_check.rc | default('n/a') }}"
      - "Port reachable: {{ ldap_port_check.state | default('unknown') }}"

- name: Installer les outils LDAP
  ansible.builtin.apt:
    name:
      - ldap-utils
    state: present
    update_cache: true

- name: Tester le bind LDAP
  ansible.builtin.command:
    argv:
      - ldapwhoami
      - -x
      - -H
      - "ldap://{{ ldap_host }}:{{ ldap_port }}"
      - -D
      - "{{ ldap_bind_dn }}"
      - -w
      - "{{ vault_service_account_password }}"
  register: ldap_bind_test
  changed_when: false
  no_log: true

- name: Tester la configuration LDAP
  ansible.builtin.command: >
    sudo -u www-data php {{ nextcloud_web_root }}/occ ldap:test-config {{ nextcloud_ldap_config_id }}
  register: ldap_test_config
  changed_when: false